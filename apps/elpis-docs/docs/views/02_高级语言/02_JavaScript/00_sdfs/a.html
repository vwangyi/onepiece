<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div id="box" style="width: 100px;height: 100px;background-color: red;"></div>

    <script>
        const dom = document.querySelector('#box')  
        // 当事件循环决定进入渲染阶段时（通常是 DOM 发生了改变，且距离上一次渲染的时间已达到帧间隔），
        // 判断是否渲染（比如 dom是否变化 且距离上一次渲染是否达到帧间隔）若不满足当前就不会执行渲染
        function runjs(t) {
            const start = performance.now();
            while (performance.now() - start < t) { 
                // console.log(1); // console.log会导致计时不准
            }
        }
        function handleClick() {
            dom.style.backgroundColor = 'blue' 
            requestAnimationFrame(() => {
                console.log('开始渲染')
            }) 
            requestIdleCallback(() =>  console.log('主线程空闲')) // 追加到空闲队列
            Promise.resolve().then(() => console.log('清空微任务'))
            setTimeout(() => {
                console.log('宏任务1');
                dom.style.backgroundColor = 'yellow' 
                requestAnimationFrame(() => {
                    console.log('开始渲染')
                })
                requestIdleCallback(() =>  console.log('主线程空闲')) // 追加到空闲队列
                Promise.resolve().then(() => console.log('清空微任务'))
                setTimeout(() => console.log('宏任务2'))
                runjs(3000); // js会阻塞渲染 

            })
            runjs(3000);

        }
        dom.addEventListener('click', handleClick) 
        setTimeout(() => {
            console.log('宏任务')
        })
        Promise.resolve().then(() => console.log('清空微任务'))
        requestAnimationFrame(() => {
            console.log('开始渲染')
        })
        console.log('初始化 同步任务');

        // 打印顺序为 '初始化 同步任务' -> '清空微任务'  ->  '开始渲染' -> '宏任务'   （70%-90%是正常顺序）
        // 打印顺序为 '初始化 同步任务' -> '清空微任务'  ->  '开始渲染'(可能跳过不执行) -> '宏任务' -> '开始渲染'  （30%-10%是渲染被跳过）  
        // 这不是 bug，而是浏览器为了性能优化采取的灵活调度策略。如果对执行顺序有严格要求，建议显式嵌套调用而不是依赖不确定的调度顺序。 
        // 想要始终保持正常顺序 就把 宏任务放在 rAF中  
    </script>
</body>

</html>
