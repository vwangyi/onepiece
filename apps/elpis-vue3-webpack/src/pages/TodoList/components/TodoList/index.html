<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>极简待办清单 | 现代交互设计</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', sans-serif;
        background: linear-gradient(145deg, #f5f7fa 0%, #e9eef3 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      /* 主卡片容器 */
      .todo-card {
        max-width: 650px;
        width: 100%;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(0px);
        border-radius: 40px;
        box-shadow:
          0 25px 50px -12px rgba(0, 0, 0, 0.25),
          0 0 0 1px rgba(0, 0, 0, 0.02);
        overflow: hidden;
        transition: transform 0.2s ease;
      }

      .todo-card:hover {
        transform: scale(1.01);
      }

      /* 头部渐变区 */
      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 32px 28px 28px;
        color: white;
      }

      .header h1 {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header h1 span {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(4px);
        font-size: 16px;
        padding: 4px 12px;
        border-radius: 40px;
        font-weight: 500;
      }

      .header p {
        margin-top: 12px;
        opacity: 0.85;
        font-size: 15px;
        font-weight: 400;
      }

      /* 统计卡片 */
      .stats {
        display: flex;
        justify-content: space-between;
        background: white;
        margin: 0 20px;
        padding: 16px 24px;
        border-radius: 28px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        transform: translateY(-25px);
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      .stat-item {
        text-align: center;
        flex: 1;
      }

      .stat-number {
        font-size: 28px;
        font-weight: 800;
        color: #1e293b;
        line-height: 1.2;
      }

      .stat-label {
        font-size: 13px;
        color: #64748b;
        font-weight: 500;
        letter-spacing: 0.3px;
      }

      /* 输入区域 */
      .input-area {
        padding: 8px 24px 24px;
      }

      .input-wrapper {
        display: flex;
        gap: 12px;
        background: #f1f5f9;
        border-radius: 60px;
        padding: 6px 6px 6px 24px;
        border: 1px solid #e2e8f0;
        transition: all 0.2s;
      }

      .input-wrapper:focus-within {
        background: white;
        border-color: #8b5cf6;
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
      }

      #taskInput {
        flex: 1;
        border: none;
        background: transparent;
        font-size: 16px;
        padding: 14px 0;
        outline: none;
        font-weight: 500;
        color: #0f172a;
      }

      #taskInput::placeholder {
        color: #94a3b8;
        font-weight: 400;
      }

      .add-btn {
        background: linear-gradient(135deg, #667eea, #764ba2);
        border: none;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      .add-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
      }

      .add-btn svg {
        width: 24px;
        height: 24px;
        stroke: white;
        stroke-width: 2;
      }

      /* 待办列表区 */
      .todo-list-container {
        padding: 0 20px 28px;
        max-height: 450px;
        overflow-y: auto;
      }

      .todo-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .todo-item {
        background: white;
        border-radius: 20px;
        padding: 12px 16px 12px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
        border: 1px solid #edf2f7;
        transition: all 0.2s;
        animation: fadeIn 0.25s ease;
      }

      .todo-item:hover {
        border-color: #cbd5e1;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        transform: translateX(2px);
      }

      /* 自定义复选框 */
      .todo-checkbox {
        width: 24px;
        height: 24px;
        border-radius: 30px;
        border: 2px solid #cbd5e1;
        background: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
      }

      .todo-checkbox.completed {
        background: #8b5cf6;
        border-color: #8b5cf6;
      }

      .todo-checkbox svg {
        width: 14px;
        height: 14px;
        stroke: white;
        stroke-width: 3;
        display: none;
      }

      .todo-checkbox.completed svg {
        display: block;
      }

      .todo-text {
        flex: 1;
        font-size: 16px;
        font-weight: 500;
        color: #1e293b;
        word-break: break-word;
        transition: all 0.2s;
      }

      .todo-text.completed {
        text-decoration: line-through;
        color: #94a3b8;
        font-weight: 400;
      }

      .delete-btn {
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 8px;
        border-radius: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.5;
        transition: all 0.2s;
      }

      .delete-btn:hover {
        opacity: 1;
        background: #fee2e2;
      }

      .delete-btn svg {
        width: 20px;
        height: 20px;
        stroke: #ef4444;
        stroke-width: 1.8;
      }

      /* 空状态 */
      .empty-state {
        text-align: center;
        padding: 48px 24px;
        color: #94a3b8;
      }

      .empty-state svg {
        width: 70px;
        height: 70px;
        stroke: #cbd5e1;
        margin-bottom: 16px;
        opacity: 0.6;
      }

      .empty-state p {
        font-size: 16px;
        font-weight: 500;
      }

      /* 底部过滤 */
      .filter-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 20px 24px;
        border-top: 1px solid #eef2ff;
        margin-top: 8px;
      }

      .filter-group {
        display: flex;
        gap: 8px;
        background: #f1f5f9;
        padding: 4px;
        border-radius: 50px;
      }

      .filter-btn {
        border: none;
        background: transparent;
        padding: 8px 18px;
        border-radius: 40px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        color: #475569;
        transition: all 0.2s;
      }

      .filter-btn.active {
        background: white;
        color: #7c3aed;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      }

      .clear-btn {
        background: transparent;
        border: none;
        color: #ef4444;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        padding: 6px 12px;
        border-radius: 40px;
        transition: 0.2s;
      }

      .clear-btn:hover {
        background: #fff1f0;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* 滚动条美化 */
      .todo-list-container::-webkit-scrollbar {
        width: 5px;
      }
      .todo-list-container::-webkit-scrollbar-track {
        background: #eef2ff;
        border-radius: 10px;
      }
      .todo-list-container::-webkit-scrollbar-thumb {
        background: #c7d2fe;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="todo-card">
      <div class="header">
        <h1>
          📋 待办清单
          <span>专注力</span>
        </h1>
        <p>捕捉灵感 · 有序完成 · 每天进步</p>
      </div>

      <div class="stats">
        <div class="stat-item">
          <div class="stat-number" id="totalCount">0</div>
          <div class="stat-label">全部</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="activeCount">0</div>
          <div class="stat-label">未完成</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="completedCount">0</div>
          <div class="stat-label">已完成</div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <input
            type="text"
            id="taskInput"
            placeholder="写一个任务，比如 “设计UI界面” ..."
            autocomplete="off"
          />
          <!-- 按钮 -->
          <button class="add-btn" id="addBtn">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
      </div>

      <div class="todo-list-container">
        <ul class="todo-list" id="todoList">
          <!-- 动态渲染任务 -->
          <div class="empty-state">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.2"
            >
              <path
                d="M9 11H15M9 15H12M12 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v7"
              />
              <path d="M16 18 L19 21 L22 18" />
              <path d="M19 15 L19 21" />
            </svg>
            <p>✨ 暂无待办事项，添加一条开始吧 ✨</p>
          </div>
        </ul>
      </div>

      <div class="filter-bar">
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="active">未完成</button>
          <button class="filter-btn" data-filter="completed">已完成</button>
        </div>
        <button class="clear-btn" id="clearCompleted">清除已完成</button>
      </div>
    </div>

    <script>
      // ---------- 数据层 ----------
      let tasks = [
        {
          id: Date.now() + 1,
          text: '浏览现代待办清单设计',
          completed: true
        },
        {
          id: Date.now() + 2,
          text: '体验交互动画与卡片质感',
          completed: false
        },
        {
          id: Date.now() + 3,
          text: '添加 3 个工作任务并完成一个',
          completed: false
        }
      ];

      let currentFilter = 'all'; // 'all', 'active', 'completed'

      // DOM 元素
      const todoListEl = document.getElementById('todoList');
      const taskInput = document.getElementById('taskInput');
      const addBtn = document.getElementById('addBtn');
      const totalSpan = document.getElementById('totalCount');
      const activeSpan = document.getElementById('activeCount');
      const completedSpan = document.getElementById('completedCount');
      const clearCompletedBtn = document.getElementById('clearCompleted');

      // 辅助函数 - 更新统计数据
      function updateStats() {
        const total = tasks.length;
        const active = tasks.filter(t => !t.completed).length;
        const completed = tasks.filter(t => t.completed).length;
        totalSpan.innerText = total;
        activeSpan.innerText = active;
        completedSpan.innerText = completed;
      }

      // 渲染待办列表 (基于当前过滤器)
      function renderTodoList() {
        let filteredTasks = tasks;
        if (currentFilter === 'active') {
          filteredTasks = tasks.filter(t => !t.completed);
        } else if (currentFilter === 'completed') {
          filteredTasks = tasks.filter(t => t.completed);
        }

        if (filteredTasks.length === 0) {
          todoListEl.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                            <path d="M9 11H15M9 15H12M12 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v7" />
                            <path d="M16 18 L19 21 L22 18" />
                            <path d="M19 15 L19 21" />
                        </svg>
                        <p>✨ 暂无待办事项，添加一条开始吧 ✨</p>
                    </div>
                `;
          updateStats();
          return;
        }

        const tasksHTML = filteredTasks
          .map(task => {
            return `
                    <li class="todo-item" data-id="${task.id}">
                        <div class="todo-checkbox ${task.completed ? 'completed' : ''}" data-complete="${task.id}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </div>
                        <div class="todo-text ${task.completed ? 'completed' : ''}">${escapeHtml(task.text)}</div>
                        <button class="delete-btn" data-delete="${task.id}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                                <line x1="10" y1="11" x2="10" y2="17" />
                                <line x1="14" y1="11" x2="14" y2="17" />
                            </svg>
                        </button>
                    </li>
                `;
          })
          .join('');

        todoListEl.innerHTML = tasksHTML;
        updateStats();
      }

      // 简单的防XSS
      function escapeHtml(str) {
        return str
          .replace(/[&<>]/g, function (m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
          })
          .replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function (c) {
            return c;
          });
      }

      // 添加新任务
      function addTask() {
        const text = taskInput.value.trim();
        if (text === '') {
          alert('请填写待办内容 ✏️');
          return;
        }
        const newTask = {
          id: Date.now(),
          text: text,
          completed: false
        };
        tasks.push(newTask);
        taskInput.value = '';
        // 如果当前过滤器不是 'all' 或 'active'，为了体验友好，自动切回全部或者保持active且展示新任务更好？
        if (currentFilter === 'completed') {
          // 添加的新任务肯定是未完成，如果处在已完成过滤器下用户看不到，自动切换到active或all？
          currentFilter = 'all';
          // 同步高亮按钮状态
          document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.dataset.filter === 'all') btn.classList.add('active');
            else btn.classList.remove('active');
          });
        }
        renderTodoList();
      }

      // 切换完成状态
      function toggleComplete(taskId) {
        const task = tasks.find(t => t.id == taskId);
        if (task) {
          task.completed = !task.completed;
          renderTodoList();
        }
      }

      // 删除任务
      function deleteTask(taskId) {
        tasks = tasks.filter(t => t.id != taskId);
        renderTodoList();
      }

      // 清除已完成任务
      function clearCompletedTasks() {
        tasks = tasks.filter(t => !t.completed);
        renderTodoList();
      }

      // 事件委托 (处理复选框点击 / 删除按钮)
      function handleListClick(e) {
        const target = e.target;
        // 点击复选框区域
        const checkboxDiv = target.closest('.todo-checkbox');
        if (checkboxDiv && checkboxDiv.dataset.complete) {
          const taskId = checkboxDiv.dataset.complete;
          toggleComplete(taskId);
          return;
        }
        // 点击删除按钮
        const deleteBtn = target.closest('.delete-btn');
        if (deleteBtn && deleteBtn.dataset.delete) {
          const taskId = deleteBtn.dataset.delete;
          deleteTask(taskId);
          return;
        }
      }

      // 过滤器切换
      function setFilter(filter) {
        currentFilter = filter;
        renderTodoList();
        // UI 高亮
        document.querySelectorAll('.filter-btn').forEach(btn => {
          if (btn.dataset.filter === filter) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });
      }

      // 初始化事件监听
      function init() {
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', e => {
          if (e.key === 'Enter') addTask();
        });
        todoListEl.addEventListener('click', handleListClick);
        clearCompletedBtn.addEventListener('click', clearCompletedTasks);

        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', e => {
            const filter = btn.dataset.filter;
            setFilter(filter);
          });
        });

        renderTodoList();
      }

      init();
    </script>
  </body>
</html>
